name: Build and push image

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/**'
      - 'README.md'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: todo-app
  ARTIFACT_BUCKET: todo-pipeline-artifacts-825765391206

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push
        id: push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          DIGEST=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageDigest' --output text)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "### Image pushed :package:" >> "$GITHUB_STEP_SUMMARY"
          echo "**Digest:** \`$DIGEST\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deployment artifacts to S3
        run: |
          cd deploy
          zip source.zip taskdef.json appspec.yaml
          aws s3 cp source.zip s3://${{ env.ARTIFACT_BUCKET }}/templates/source.zip